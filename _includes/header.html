<header class="header">
  <div class="header-overlay">
    <div class="container header-container">
      <div class="header-left">
        <h1 class="header-heading">
          <a href="{{ site.github.url }}/">
            {{ site.title }}
          </a>
        </h1>
        <div class="header-description">
          {{ site.description }}
        </div>
      </div>
      <div class="header-search hidden-extra-small">
        <form class="header-search-form" action="{{ site.github.url | default: site.url }}/search" method="get">
          <input type="search" name="q" placeholder="エピソードを検索..."
                 class="header-search-input" autocomplete="off">
        </form>
      </div>
      <a href="{{ site.github.url | default: site.url }}/search" class="header-search-icon visible-extra-small" aria-label="検索">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </a>
    </div>
  </div>
</header>
